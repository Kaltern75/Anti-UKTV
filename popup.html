<!DOCTYPE html>
<html><head><meta charset="utf-8" />
<style>
:root { color-scheme: light dark; }
body { font-family: system-ui, Segoe UI, Roboto, sans-serif; width: 240px; margin: 0; padding: 16px; }
h1 { font-size: 15px; margin: 0 0 4px; }
p.sub { margin: 0 0 14px; font-size: 12px; opacity: 0.7; }
.row { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.switch { position: relative; width: 44px; height: 24px; flex: none; }
.switch input { opacity: 0; width: 0; height: 0; }
.slider { position: absolute; inset: 0; cursor: pointer; background: #bbb; border-radius: 24px; transition: 0.2s; }
.slider::before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.2s; }
input:checked + .slider { background: #c00; }
input:checked + .slider::before { transform: translateX(20px); }
.label { font-size: 13px; font-weight: 600; }
</style></head>
<body>
<h1>AntiUKTV</h1>
<p class="sub">Hides BBC, ITV &amp; Channel 4 on YouTube.</p>
<div class="row"><span class="label">Enabled</span>
<label class="switch"><input type="checkbox" id="toggle" /><span class="slider"></span></label></div>
<script src="popup.js"></script>
</body></html>
